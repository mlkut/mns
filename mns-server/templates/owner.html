{% extends "base.html" %}

{% block extra_css %}
<link rel="stylesheet" href="/static/css/owner.css">
{% endblock %}

{% block content %}
<main>
<section class="card">
  <header class="header">
    <h1>Owner</h1>
  </header>
  <p class="owner-address">
    <span title="{{ address }}">{{ truncated }}</span>
    <button class="copy-btn" id="copy-addr" data-addr="{{ address }}" aria-label="Copy address">
      <svg class="copy-icon" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
      </svg>
      <span class="copy-label">Copy</span>
    </button>
  </p>
  <div class="you-badge" id="you-badge" data-owner-address="{{ address }}">This is you</div>

  <div class="divider" role="separator"></div>

  {{ names_html | safe }}
</section>

<nav class="back-wrap" aria-label="Breadcrumb">
  <a class="back-link" href="/">← Home</a>
</nav>
</main>
{% endblock %}

{% block extra_scripts %}
<script src="/static/js/owner.js"></script>
{% endblock %}
