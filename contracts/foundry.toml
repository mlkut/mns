[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
solc_version = "0.8.33"
# Use evm version previous to Paris in RSK to avoid prevrandao error
# https://book.getfoundry.sh/cheatcodes/prevrandao
evm_version = "london"

remappings = [
  "forge-std/=lib/forge-std/src/",
  "safe-tools/=lib/safe-tools/src/",
  "safe-contracts/=lib/safe-contracts/contracts/",
  "solady/=lib/solady/src/",
  "safe-contracts/=lib/safe-tools/lib/safe-contracts/contracts/",
]

[rpc_endpoints]
rsk_mainnet = "https://rpc.mainnet.rootstock.io"
rsk_testnet = "https://rpc.testnet.rootstock.io"
