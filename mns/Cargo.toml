[package]
name = "mns"
version = "0.1.0"
edition = "2024"
authors = ["Nuh <nuh@nuh.dev>"]
description = "Short random names for permissionless DNS"
homepage = "https://mlkut.org/"
repository = "https://github.com/mlkut/mns"
license = "MIT"
keywords = ["p2p", "dns", "decentralized", "sovereign", "identity"]
categories = ["network-programming"]

[dependencies]
ed25519-dalek = "2.1.1"
rand = "0.8" 
tracing = "0.1.41"
sha2 = "0.10.9"
rayon = "1.11.0"
equix = "0.2.5"
hashx = "0.3.4"

[dev-dependencies]
proptest = "1.11.0"
rayon = "1"
